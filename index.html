  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0a0a0a; font-family:'Courier New',monospace; touch-action:manipulation; -webkit-tap-highlight-color:transparent; user-select:none; background-image:radial-gradient(circle at 20% 20%, #1a1a1a 1px, transparent 1px); background-size:30px 30px; }
    #psyCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
    .radio-body {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10;
      width:92vw; height:92vh; max-width:500px; max-height:750px;
      background:linear-gradient(145deg, #2c2c2c, #1a1a1a);
      border-radius:60px 60px 40px 40px;
      box-shadow:inset 0 0 30px rgba(0,0,0,0.9), 0 10px 30px rgba(0,0,0,0.8), 0 0 0 4px #3a3a3a, 0 0 0 8px #111, 0 0 0 12px #4a4a4a, inset 0 0 100px rgba(0,0,0,0.5);
      border:2px solid #555;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2vh;
      padding:4vh 5vw 5vh; overflow:hidden;
      animation:floatRadio 8s ease-in-out infinite;
      background-image:linear-gradient(145deg, #2c2c2c, #1a1a1a), repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 6px), radial-gradient(circle at 20% 30%, rgba(139,69,19,0.15) 2%, transparent 10%), radial-gradient(circle at 80% 70%, rgba(255,140,0,0.1) 3%, transparent 15%);
      background-blend-mode: overlay;
    }
    @keyframes floatRadio { 0%,100%{transform:translate(-50%,-50%) rotate(0deg)} 25%{transform:translate(-50%,-53%) rotate(0.5deg)} 75%{transform:translate(-50%,-47%) rotate(-0.5deg)} }
    .radio-body::before,.radio-body::after,.rivet-bottom-left,.rivet-bottom-right { content:''; position:absolute; width:12px; height:12px; background:radial-gradient(circle, #888, #333); border-radius:50%; box-shadow:inset 0 0 4px #000, 0 0 8px rgba(0,0,0,0.5); z-index:5; }
    .radio-body::before { top:15px; left:25px; } .radio-body::after { top:15px; right:25px; }
    .rivet-bottom-left { bottom:15px; left:25px; } .rivet-bottom-right { bottom:15px; right:25px; }
    .rust-effect { position:absolute; pointer-events:none; z-index:2; width:100%; height:100%; border-radius:inherit; background:radial-gradient(circle at 30% 40%, rgba(210,105,30,0.2) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(255,140,0,0.15) 0%, transparent 40%); mix-blend-mode:multiply; }
    .brand-text { font-size: clamp(1.5rem, 5vw, 2.5rem); letter-spacing:4px; text-align:center; font-weight:bold; color:#5a5a5a; text-shadow:-1px -1px 2px rgba(0,0,0,0.8), 1px 1px 2px rgba(255,255,255,0.15), 0 0 5px rgba(0,0,0,0.5); transform:perspective(500px) rotateX(3deg); margin-bottom:-1vh; }
    .display-screen { width:85%; height:40%; max-height:240px; background:linear-gradient(180deg, #0d1a0d 0%, #030703 100%); border-radius:20px; border:3px solid #3a3a3a; box-shadow:inset 0 0 30px #000000, 0 0 20px #ff00ff33; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; cursor: pointer; }
    .visualizer-canvas { width:100%; height:100%; border-radius:10px; position:absolute; top:0; left:0; }
    .status-message { position:absolute; bottom:10%; left:0; width:100%; text-align:center; font-size:clamp(0.7rem, 2.5vw, 1rem); color:#ff00ff; text-shadow:0 0 10px #ff00ff; letter-spacing:2px; font-weight:bold; pointer-events:none; z-index:10; white-space:nowrap; overflow:hidden; }
    .mode-selectors { display:flex; gap:1.5rem; margin:0.5vh 0; z-index: 20; }
    .mode-btn { background:linear-gradient(180deg, #3a3a3a 0%, #1f1f1f 100%); border:2px solid #555; border-radius:12px; padding:0.6rem 1.2rem; font-family:'Courier New',monospace; font-weight:bold; font-size:clamp(0.8rem, 2.5vw, 1rem); letter-spacing:2px; color:#888; text-shadow:0 1px 0 #00000088, 0 -1px 0 #ffffff22; box-shadow:inset 0 2px 5px rgba(0,0,0,0.8), 0 3px 6px rgba(0,0,0,0.6); cursor:pointer; transition:all 0.2s ease; text-transform:uppercase; outline:none; user-select:none; -webkit-tap-highlight-color:transparent; }
    .mode-btn.active { color:#00ffff; text-shadow:0 0 12px #00ffff, 0 0 25px #00ffff; border-color:#00ffff; box-shadow:0 0 15px #00ffff88, inset 0 0 8px #00ffff44; background:linear-gradient(180deg, #2a3a3a 0%, #0f1f1f 100%); }
    .paypal-btn { position:absolute; bottom:20px; left:20px; background:#ffc439; color:#000; font-weight:bold; padding:6px 15px; border-radius:20px; text-decoration:none; font-size:0.7rem; box-shadow:0 0 15px #ffc439; z-index:25; letter-spacing:1px; cursor: pointer; display: block !important; }
    .hidden-track-count { position:absolute; bottom:3%; right:5%; color:rgba(255,255,255,0.08); font-size:clamp(0.6rem, 1.8vw, 0.9rem); font-weight:bold; pointer-events:none; z-index:15; }
    .legal-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; display:flex; align-items:center; justify-content:center; color:#fff; }
    .legal-content { background:#1a1a1a; border:2px solid #ff00ff; border-radius:20px; padding:2rem; max-width:350px; text-align:center; font-family:'Courier New',monospace; }
    .legal-content h2 { color:#ff00ff; margin-bottom:1rem; }
    .legal-content p { font-size:0.8rem; margin:0.5rem 0; line-height:1.4; }
    .legal-content a { color:#00ffff; }
    .legal-btn { background:#ff00ff; border:none; color:#000; font-weight:bold; padding:0.7rem 2rem; border-radius:30px; cursor:pointer; margin-top:1rem; font-family:'Courier New',monospace; box-shadow:0 0 15px #ff00ff88; }
    .logo-top-container { display:flex; align-items:center; justify-content:center; min-height:50px; }
    .logo-bottom-container { position:absolute; bottom:20px; right:20px; z-index:25; display:flex; align-items:center; justify-content:center; }
    @media (max-width:400px) { .radio-body { width:96vw; height:96vh; border-radius:40px; padding:3vh 4vw; } .display-screen { height:45%; } .brand-text { font-size: clamp(1.2rem, 6vw, 2rem); } .mode-btn { padding: 0.4rem 0.8rem; font-size: 0.7rem; } }
  </style>

<body>
  <canvas id="psyCanvas" aria-hidden="true"></canvas>

  <div class="radio-body" role="application" aria-label="PsikodeliA TeknoRadio">
    <div class="rust-effect"></div>
    <div class="rivet-bottom-left"></div>

      <button class="legal-btn" id="acceptLegal">Aceptar</button>
    </div>
